name: Bug report
description: Report a reproducible problem with the extension
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here. Follow SECURITY.md instead.
  - type: input
    id: version
    attributes:
      label: Extension version
      placeholder: 0.4.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, Chrome version, and installation method
      placeholder: macOS 15, Chrome 136, load unpacked
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Provider and model
      placeholder: OpenAI, gpt-4o-mini
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open ...
        2. Enable ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove API keys, tokens, private URLs, and personal data before posting.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed credentials and personal information from logs.
          required: true
